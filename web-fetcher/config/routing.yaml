# Web Fetcher Routing Configuration
# 网页获取器路由配置
version: "1.0"

# Global Settings / 全局设置
global:
  default_fetcher: urllib
  cache_ttl: 3600
  enable_logging: true

# Fallback Chain (auto mode) / 降级链（auto 模式）
# urllib → CDP (headless Chrome) → manual_chrome (用户本地 Chrome)
# 每级失败或内容验证不通过时自动降级到下一级

# Routing Rules / 路由规则
# Rules are evaluated in priority order (higher number = higher priority)
# 规则按优先级顺序评估（数字越大优先级越高）
rules:
  # High Priority: Known problematic sites / 高优先级：已知问题网站
  - name: "CEB Bank Anti-Bot Protection"
    name_zh: "光大银行反爬虫保护"
    priority: 100
    enabled: true
    conditions:
      domain: "cebbank.com.cn"
      url_pattern: ".*/(site|zhpd)/.*"
    action:
      fetcher: "manual_chrome"
      reason: "Known anti-bot protection requiring manual navigation"
      reason_zh: "已知反爬虫保护，需要手动导航"

  # WeChat Official Accounts / 微信公众号
  # urllib + 微信专用 UA 即可采集（core.py 硬编码 MicroMessenger UA）
  # 降级链: urllib(✅ 稳定可用，2s) → CDP(备选，12s) → manual_chrome
  # 注：之前误判为"需要CDP"，实测 urllib 正常工作且更快
  - name: "WeChat Articles - urllib"
    name_zh: "微信公众号 - urllib直连"
    priority: 80
    enabled: true
    conditions:
      domain_list:
        - "mp.weixin.qq.com"
        - "weixin.qq.com"
    action:
      fetcher: "urllib"
      reason: "WeChat articles work with urllib + WeChat UA, faster than CDP"
      reason_zh: "微信公众号 urllib + 微信UA即可采集，比CDP快"

  # XiaoHongShu / 小红书
  # urllib 可采集标题+正文+图片（通过 SSR/meta 标签），速度快（~1s）
  # 降级链: urllib(✅ 可用) → CDP(IP风控可能拦截,error_code=300012) → manual_chrome
  # 短链 xhslink.com 通过 GET 请求解析重定向到 xiaohongshu.com
  # 注：之前误判为"纯SPA无内容"，实测 urllib 可提取内容
  - name: "XiaoHongShu - urllib"
    name_zh: "小红书 - urllib直连"
    priority: 75
    enabled: true
    conditions:
      domain_list:
        - "xiaohongshu.com"
        - "xhs.com"
        - "xhslink.com"
    action:
      fetcher: "urllib"
      reason: "XiaoHongShu SSR provides title/content/images via urllib, faster than CDP"
      reason_zh: "小红书 SSR 提供标题/正文/图片，urllib 可直接采集，比CDP快"

  # Zhihu: JS-rendered content / 知乎：JS渲染内容
  - name: "Zhihu - CDP"
    name_zh: "知乎 - CDP直连"
    priority: 70
    enabled: true
    conditions:
      domain_list:
        - "zhihu.com"
        - "www.zhihu.com"
        - "zhuanlan.zhihu.com"
    action:
      fetcher: "cdp"
      config:
        wait_time: 3
      reason: "Zhihu articles and answers require JS rendering"
      reason_zh: "知乎文章和回答需要JS渲染"

  # Juejin: JS-rendered tech blog / 掘金：JS渲染技术博客
  - name: "Juejin - CDP"
    name_zh: "掘金 - CDP直连"
    priority: 70
    enabled: true
    conditions:
      domain_list:
        - "juejin.cn"
        - "juejin.im"
    action:
      fetcher: "cdp"
      config:
        wait_time: 3
      reason: "Juejin is a React SPA requiring JS rendering"
      reason_zh: "掘金为React SPA，需要JS渲染"

  # Dianping: JS + anti-bot / 大众点评：JS渲染+反爬
  - name: "Dianping - CDP"
    name_zh: "大众点评 - CDP直连"
    priority: 70
    enabled: true
    conditions:
      domain_list:
        - "dianping.com"
        - "www.dianping.com"
        - "m.dianping.com"
    action:
      fetcher: "cdp"
      config:
        wait_time: 5
      reason: "Dianping requires JS rendering and has anti-bot protection"
      reason_zh: "大众点评需要JS渲染且有反爬虫保护"

  # Bilibili: JS-rendered video platform / B站：JS渲染视频平台
  - name: "Bilibili - CDP"
    name_zh: "B站 - CDP直连"
    priority: 65
    enabled: true
    conditions:
      domain_list:
        - "bilibili.com"
        - "www.bilibili.com"
        - "b23.tv"
    action:
      fetcher: "cdp"
      config:
        wait_time: 3
      reason: "Bilibili article/video pages require JS rendering"
      reason_zh: "B站文章/视频页面需要JS渲染"

  # Douyin/Toutiao: ByteDance JS apps / 抖音/头条：字节JS应用
  - name: "ByteDance Apps - CDP"
    name_zh: "字节跳动应用 - CDP直连"
    priority: 65
    enabled: true
    conditions:
      domain_list:
        - "douyin.com"
        - "toutiao.com"
        - "www.toutiao.com"
    action:
      fetcher: "cdp"
      config:
        wait_time: 5
      reason: "ByteDance apps are fully JS-rendered"
      reason_zh: "字节系应用为纯JS渲染"

  # Google Search: JavaScript rendering + Anti-bot protection / Google搜索：JavaScript渲染 + 反爬虫
  - name: "Google Search - CDP Required"
    name_zh: "Google搜索 - 需要CDP"
    priority: 95
    enabled: true
    conditions:
      domain_list:
        - "google.com"
        - "google.com.hk"
        - "google.cn"
      domain_pattern: "^.*\\.google\\.com$"
      url_pattern: ".*/search.*"
    action:
      fetcher: "cdp"
      config:
        wait_time: 3
      reason: "JavaScript rendering required and anti-bot protection"
      reason_zh: "需要JavaScript渲染且有反爬虫保护"

  # Rodong Sinmun: Static content with template-based parsing / 劳动新闻：使用模板解析的静态内容
  - name: "Rodong Sinmun - Static Content"
    name_zh: "劳动新闻 - 静态内容"
    priority: 90
    enabled: true
    conditions:
      domain: "rodong.rep.kp"
    action:
      fetcher: "urllib"
      reason: "Static content, template-based parsing"
      reason_zh: "静态内容，使用模板解析"

  # News.cn: Template-based parsing for Xinhua News Agency / 新华网：新华社新闻模板解析
  - name: "News.cn - Template Parser"
    name_zh: "新华网 - 模板解析器"
    priority: 85
    enabled: true
    conditions:
      domain_list:
        - "news.cn"
        - "www.news.cn"
      domain_pattern: "^.*\\.news\\.cn$"
    action:
      fetcher: "urllib"
      parser: "template"
      template: "News.cn Articles"
      reason: "Static content with custom HTML structure requiring specialized template"
      reason_zh: "具有自定义HTML结构的静态内容，需要专用模板"

  # Wikipedia: Static content with template-based parsing / 维基百科：使用模板解析的静态内容
  - name: "Wikipedia - Static Content"
    name_zh: "维基百科 - 静态内容"
    priority: 90
    enabled: true
    conditions:
      domain: "zh.wikipedia.org"
    action:
      fetcher: "urllib"
      reason: "Static MediaWiki content, template-based parsing"
      reason_zh: "静态MediaWiki内容，使用模板解析"

  # Default fallback (lowest priority) / 默认回退（最低优先级）
  - name: "Default - Static Sites"
    name_zh: "默认 - 静态网站"
    priority: 1
    enabled: true
    conditions:
      always: true
    action:
      fetcher: "urllib"
      reason: "Standard static content"
      reason_zh: "标准静态内容"
